name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: none of these jobs write to the repo or use secrets.
permissions:
  contents: read

jobs:
  backend:
    name: backend (ruff + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync
      - run: uv run ruff format --check app tests scripts
      - run: uv run ruff check app tests
      - run: uv run pytest --cov=app --cov-report=term-missing --cov-fail-under=85

  frontend:
    name: frontend (lint + typecheck + vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.15.1
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # shared-types/src/schema.ts is committed, so the web build needs no Python here.
      - run: pnpm --filter web lint
      - run: pnpm --filter web typecheck
      - run: pnpm --filter web test

  e2e:
    name: e2e (playwright streaming path)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --project apps/api
      - uses: pnpm/action-setup@v4
        with:
          version: 10.15.1
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browser
        working-directory: apps/web
        run: pnpm exec playwright install --with-deps chromium
      # Playwright boots its own mock-LLM uvicorn (../api) + Next dev per playwright.config.ts.
      - run: pnpm --filter web test:e2e
